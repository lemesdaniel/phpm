name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release -p cli --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          dir="phpm-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/phpm" "$dir/"
          tar -czf "phpm-${{ matrix.target }}.tar.gz" -C "$dir" phpm

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "phpm-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $dir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/phpm.exe" "$dir/"
          Compress-Archive -Path "$dir/phpm.exe" -DestinationPath "phpm-${{ matrix.target }}.zip"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            phpm-${{ matrix.target }}.tar.gz
            phpm-${{ matrix.target }}.zip

  installers:
    name: attach installers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload install scripts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            install.ps1
